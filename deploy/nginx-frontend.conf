# Frontend — oi.structorg.com
# Copy to: /etc/nginx/sites-available/oi.structorg.com

server {
    listen 80;
    server_name oi.structorg.com;

    root /var/www/struct/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
